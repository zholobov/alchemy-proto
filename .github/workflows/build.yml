name: Build

# Security note: this workflow does NOT consume any untrusted GitHub event
# input (issue titles, PR bodies, commit messages, etc.) inside run: blocks.
# All ${{ }} interpolations reference either the hard-coded env block or
# trusted metadata (github.ref, github.sha, runner.os, github.ref_name).
# github.ref_name is the tag name, which is attacker-controllable in theory
# but is only used inside release body text (not executed by the shell).

on:
  push:
    tags:
      - 'v*'        # release builds: v0.1.0, v1.2.3-beta, etc.
    branches:
      - main        # dev builds: artifact-only, expires after 14 days
  workflow_dispatch:  # manual trigger from the Actions tab

env:
  GODOT_VERSION: 4.6.2-stable
  PROJECT_NAME: alchemy-proto

jobs:
  build-windows:
    name: Export Windows Desktop
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required by softprops/action-gh-release to create releases
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Godot binary and export templates
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: |
            ~/godot-bin
            ~/.local/share/godot/export_templates
          key: godot-${{ env.GODOT_VERSION }}-v1

      - name: Install Godot
        if: steps.cache-godot.outputs.cache-hit != 'true'
        env:
          GODOT_VERSION: ${{ env.GODOT_VERSION }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/godot-bin"
          wget -q -O /tmp/godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d /tmp/godot-extract
          mv "/tmp/godot-extract/Godot_v${GODOT_VERSION}_linux.x86_64" "$HOME/godot-bin/godot"
          chmod +x "$HOME/godot-bin/godot"

      - name: Install export templates
        if: steps.cache-godot.outputs.cache-hit != 'true'
        env:
          GODOT_VERSION: ${{ env.GODOT_VERSION }}
        run: |
          set -euo pipefail
          # Godot stores templates under a directory named X.Y.Z.stable
          # (dot-separated), but release tags use X.Y.Z-stable (dash-separated).
          TEMPLATE_SUBDIR="${GODOT_VERSION%-stable}.stable"
          TEMPLATE_DIR="$HOME/.local/share/godot/export_templates/${TEMPLATE_SUBDIR}"
          mkdir -p "$TEMPLATE_DIR"
          wget -q -O /tmp/templates.tpz \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_export_templates.tpz"
          # .tpz is a zip; extract and move inner templates/ contents.
          unzip -q /tmp/templates.tpz -d /tmp/templates-extract
          mv /tmp/templates-extract/templates/* "$TEMPLATE_DIR/"
          ls "$TEMPLATE_DIR" | head -10

      - name: Add Godot to PATH
        run: echo "$HOME/godot-bin" >> "$GITHUB_PATH"

      - name: Verify Godot version
        run: godot --headless --version

      - name: Import project
        # .import files and the .godot/ cache are not tracked in git — Godot's
        # --import pass regenerates them. It returns non-zero on first run even
        # when successful (known 4.x quirk), so we tolerate the exit code.
        run: |
          godot --headless --import || true

      - name: Run unit tests
        run: |
          godot --headless --script tests/unit/run_unit_tests.gd

      - name: Run integration tests
        run: |
          godot --headless --script tests/integration/run_integration_tests.gd

      - name: Export Windows Desktop (release build)
        env:
          PROJECT_NAME: ${{ env.PROJECT_NAME }}
        run: |
          set -euo pipefail
          mkdir -p build
          godot --headless --export-release "Windows Desktop" "build/${PROJECT_NAME}.exe"
          ls -lh build/

      - name: Package release zip
        env:
          PROJECT_NAME: ${{ env.PROJECT_NAME }}
        run: |
          set -euo pipefail
          cd build
          zip -9 "${PROJECT_NAME}-windows-x86_64.zip" "${PROJECT_NAME}.exe"
          ls -lh

      - name: Upload dev artifact (push to main)
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-windows-dev-${{ github.sha }}
          path: build/${{ env.PROJECT_NAME }}-windows-x86_64.zip
          retention-days: 14
          if-no-files-found: error

      - name: Create GitHub Release (tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/${{ env.PROJECT_NAME }}-windows-x86_64.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          body: |
            Windows desktop build of `${{ env.PROJECT_NAME }}`, tag `${{ github.ref_name }}`.

            Built with Godot ${{ env.GODOT_VERSION }} on ${{ runner.os }}.

            > **First-run warning:** this build is unsigned. Windows will show a SmartScreen
            > dialog ("Windows protected your PC"). Click **More info → Run anyway** to start
            > the game. Code signing is a planned improvement — see the project README.
